<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ABHINAV BLOCKCRAFT</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    font-family:Arial;
}

canvas{
    display:block;
}

#crosshair{
    position:fixed;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:28px;
    user-select:none;
    pointer-events:none;
}

#title{
    position:fixed;
    top:15px;
    right:20px;
    color:gold;
    font-size:30px;
    font-weight:bold;
}
</style>
</head>

<body>

<div id="title">
ABHINAV BLOCKCRAFT
</div>

<div id="crosshair">+</div>

<script type="module">

import * as THREE from
"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";

/* ========= SCENE ========= */

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x87CEEB);

/* ========= CAMERA ========= */

const camera =
new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.rotation.order = "YXZ";

/* ========= RENDERER ========= */

const renderer =
new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

/* ========= LIGHT ========= */

const sun =
new THREE.DirectionalLight(
    0xffffff,
    1.2
);

sun.position.set(
    50,
    100,
    50
);

scene.add(sun);

scene.add(
    new THREE.AmbientLight(
        0xffffff,
        0.5
    )
);

/* ========= PLAYER ========= */

const player = {

    x:0,
    y:3,
    z:0,

    velocityY:0,

    grounded:false,

    speed:0.15

};

let yaw = 0;
let pitch = 0;

const keys = {};

/* ========= CONTROLS ========= */

document.body.onclick = ()=>{

    document.body.requestPointerLock();

};

document.addEventListener(
"mousemove",
e=>{

    if(
        document.pointerLockElement
        !== document.body
    ) return;

    yaw -= e.movementX * 0.002;

    pitch -= e.movementY * 0.002;

    pitch = Math.max(
        -1.5,
        Math.min(1.5,pitch)
    );

}
);

document.addEventListener(
"keydown",
e=>{

    keys[e.key.toLowerCase()] = true;

}
);

document.addEventListener(
"keyup",
e=>{

    keys[e.key.toLowerCase()] = false;

}
);

/* ========= TEST WORLD ========= */

const grass =
new THREE.MeshLambertMaterial({
    color:0x4CAF50
});

for(let x=-20;x<20;x++){

    for(let z=-20;z<20;z++){

        const block =
        new THREE.Mesh(

            new THREE.BoxGeometry(1,1,1),

            grass

        );

        block.position.set(
            x,
            -0.5,
            z
        );

        scene.add(block);

    }

}

/* ========= GAME LOOP ========= */

function animate(){

    requestAnimationFrame(
        animate
    );

    const fx =
    Math.sin(yaw);

    const fz =
    Math.cos(yaw);

    const rx =
    Math.cos(yaw);

    const rz =
    -Math.sin(yaw);

    if(keys["w"]){

        player.x -= fx * player.speed;
        player.z -= fz * player.speed;

    }

    if(keys["s"]){

        player.x += fx * player.speed;
        player.z += fz * player.speed;

    }

    if(keys["a"]){

        player.x -= rx * player.speed;
        player.z -= rz * player.speed;

    }

    if(keys["d"]){

        player.x += rx * player.speed;
        player.z += rz * player.speed;

    }

    player.velocityY -= 0.01;

    player.y += player.velocityY;

    if(player.y < 2){

        player.y = 2;

        player.velocityY = 0;

        player.grounded = true;

    }

    if(
        keys[" "] &&
        player.grounded
    ){

        player.velocityY = 0.22;

        player.grounded = false;

    }

    camera.position.set(
        player.x,
        player.y,
        player.z
    );

    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

    renderer.render(
        scene,
        camera
    );

}

animate();

/* ========= RESIZE ========= */

window.addEventListener(
"resize",
()=>{

    camera.aspect =
    window.innerWidth /
    window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

}
);

console.log(
"ABHINAV BLOCKCRAFT V1 LOADED"
);

</script>

</body>
</html>
