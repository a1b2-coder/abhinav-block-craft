<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({
    canvas: document.getElementById("game")
});

renderer.setSize(window.innerWidth, window.innerHeight);
    // ===== LIGHTING =====

renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(20,30,10);
light.castShadow = true;

light.shadow.mapSize.width = 2048;
light.shadow.mapSize.height = 2048;

scene.add(light);
scene.add(new THREE.AmbientLight(0xffffff,0.5));


// ===== MATERIALS =====

const grassMaterial = new THREE.MeshLambertMaterial({ color:0x55aa55 });
const woodMaterial  = new THREE.MeshLambertMaterial({ color:0x8B4513 });
const leafMaterial  = new THREE.MeshLambertMaterial({ color:0x228B22 });
const darkMaterial  = new THREE.MeshLambertMaterial({ color:0x333333 });
const whiteMaterial = new THREE.MeshLambertMaterial({ color:0xffffff });

const glassMaterial = new THREE.MeshLambertMaterial({
    color:0x88ccff,
    transparent:true,
    opacity:0.5
});

const roadMaterial = new THREE.MeshLambertMaterial({
    color:0x777777
});

const wheatMaterial = new THREE.MeshLambertMaterial({
    color:0xffdd33
});


// ===== WORLD TERRAIN =====

for(let x=-30;x<30;x++){
// ===== BLUE WATER LAKE =====

const waterMaterial = new THREE.MeshPhongMaterial({
    color: 0x3399ff,
    transparent: true,
    opacity: 0.85
});

for(let x=-8; x<8; x++){

    for(let z=-8; z<8; z++){

        if(x*x + z*z < 40){

            const water = new THREE.Mesh(
                new THREE.BoxGeometry(1,0.3,1),
                waterMaterial
            );

            water.position.set(x,-1.2,z);

            water.receiveShadow = true;

            scene.add(water);
        }
    }
}
    for(let z=-30;z<30;z++){

        const h = Math.floor(
            Math.sin(x*0.2)*2 +
            Math.cos(z*0.2)*2
        );
const solidBlocks = [];
        const block = new THREE.Mesh(
            new THREE.BoxGeometry(1,1,1),
            grassMaterial
        );
solidBlocks.push(block);
        block.position.set(x,h-1,z);
        block.castShadow = true;
        block.receiveShadow = true;

        scene.add(block);
    }
}


// ===== TREES =====

function makeTree(x,z){

    const trunk = new THREE.Mesh(
        new THREE.BoxGeometry(1,4,1),
        woodMaterial
    );

    trunk.position.set(x,1,z);
    trunk.castShadow = true;
    scene.add(trunk);

    const leaves = new THREE.Mesh(
        new THREE.BoxGeometry(3,3,3),
        leafMaterial
    );

    leaves.position.set(x,4,z);
    leaves.castShadow = true;
    scene.add(leaves);
}

for(let i=0;i<20;i++){

    makeTree(
        Math.random()*40-20,
        Math.random()*40-20
    );
}


// ===== MODERN HOUSES =====

function makeHouse(x,z){

    const base = new THREE.Mesh(
        new THREE.BoxGeometry(6,4,6),
        darkMaterial
    );

    base.position.set(x,2,z);
    base.castShadow = true;
    scene.add(base);


    const roof = new THREE.Mesh(
        new THREE.BoxGeometry(7,1,7),
        whiteMaterial
    );

    roof.position.set(x,5,z);
    roof.castShadow = true;
    scene.add(roof);


    const glass = new THREE.Mesh(
        new THREE.BoxGeometry(4,2,0.2),
        glassMaterial
    );

    glass.position.set(x,2,z+3);
    scene.add(glass);
}


// ===== 7 HOUSES =====

makeHouse(0,0);
makeHouse(10,0);
makeHouse(20,0);

makeHouse(0,10);
makeHouse(10,10);
makeHouse(20,10);

makeHouse(10,20);
    // ===== ROADS =====

function makeRoad(x1,z1,x2,z2){

    const dx = x2 - x1;
    const dz = z2 - z1;

    const length = Math.sqrt(dx*dx + dz*dz);

    const road = new THREE.Mesh(
        new THREE.BoxGeometry(length,0.2,2),
        roadMaterial
    );

    road.position.set(
        (x1+x2)/2,
        -0.5,
        (z1+z2)/2
    );

    road.rotation.y = Math.atan2(dz,dx);

    road.receiveShadow = true;

    scene.add(road);
}

makeRoad(0,0,20,0);
makeRoad(0,10,20,10);
makeRoad(10,0,10,20);


// ===== FARM =====

function makeFarm(x,z){

    for(let i=0;i<6;i++){

        for(let j=0;j<6;j++){

            const wheat = new THREE.Mesh(
                new THREE.BoxGeometry(0.2,1,0.2),
                wheatMaterial
            );

            wheat.position.set(
                x+i,
                0,
                z+j
            );

            scene.add(wheat);
        }
    }
}

makeFarm(25,8);


// ===== VILLAGERS =====

const villagers = [];

function createVillager(x,z){

    const villager = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(0.8,1.2,0.6),
        woodMaterial
    );

    body.position.y = 0.6;
    villager.add(body);

    const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.7,0.7,0.7),
        new THREE.MeshLambertMaterial({
            color:0xffd7b5
        })
    );

    head.position.y = 1.5;
    villager.add(head);

    villager.position.set(x,0,z);

    scene.add(villager);

    villagers.push(villager);
}
// ===== ANIMALS =====

const animals = [];

function createAnimal(x,z,color){

    const animal = new THREE.Group();

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.2,0.8,0.6),
        new THREE.MeshLambertMaterial({
            color: color
        })
    );

    body.position.y = 0.8;
    animal.add(body);

    const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.5,0.5,0.5),
        new THREE.MeshLambertMaterial({
            color: color
        })
    );

    head.position.set(0.8,0.9,0);

    animal.add(head);

    animal.position.set(x,0,z);

    scene.add(animal);

    animals.push(animal);
}
createVillager(5,5);
createVillager(15,5);
createVillager(10,15);


// ===== PLAYER =====

camera.position.set(0,2,10);

const keys = {};

document.addEventListener("keydown",e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",e=>{
    keys[e.key.toLowerCase()] = false;
});

document.body.addEventListener("click",()=>{
    renderer.domElement.requestPointerLock();
});
function canMove(x,z){

    for(const block of solidBlocks){

        const dx = Math.abs(block.position.x - x);
        const dz = Math.abs(block.position.z - z);

        if(dx < 0.6 && dz < 0.6){

            if(camera.position.y < block.position.y + 2){

                return false;

            }
        }
    }

    return true;
}
let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove",e=>{

    if(document.pointerLockElement !== renderer.domElement) return;

    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;

    pitch = Math.max(
        -Math.PI/2,
        Math.min(Math.PI/2,pitch)
    );

    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

});


// ===== GAME LOOP =====

function animate(){

    requestAnimationFrame(animate);

    const speed = 0.1;

    const forward = new THREE.Vector3(
        Math.sin(yaw),
        0,
        Math.cos(yaw)
    );

    const right = new THREE.Vector3(
        Math.cos(yaw),
        0,
        -Math.sin(yaw)
    );

    if(keys["w"])
        camera.position.add(
            forward.clone().multiplyScalar(speed)
        );

    if(keys["s"])
        camera.position.add(
            forward.clone().multiplyScalar(-speed)
        );

    if(keys["a"])
        camera.position.add(
            right.clone().multiplyScalar(-speed)
        );

    if(keys["d"])
        camera.position.add(
            right.clone().multiplyScalar(speed)
        );


    // Villager animation
   villagers.forEach((v,i)=>{

    v.position.x += Math.sin(Date.now()*0.001+i)*0.01;
    v.position.z += Math.cos(Date.now()*0.001+i)*0.01;

    v.rotation.y += 0.01;

});

        v.position.x += Math.sin(
            Date.now()*0.001 + i
        ) * 0.003;

    });

    renderer.render(scene,camera);
}

animate();

window.addEventListener("resize",()=>{

    camera.aspect =
        window.innerWidth /
        window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

</script>
