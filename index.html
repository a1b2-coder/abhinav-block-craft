<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ABHINAV BLOCK CRAFT</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

#title{
    position:absolute;
    top:20px;
    right:20px;

    font-size:42px;
    font-weight:bold;
    font-family:serif;

    color:#FFD700;

    text-shadow:
        0 0 10px #FFD700,
        0 0 20px orange,
        0 0 40px black;

    z-index:100;
}

#crosshair{
    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    color:white;
    font-size:28px;

    text-shadow:0 0 10px black;

    pointer-events:none;

    z-index:100;
}
</style>

</head>

<body>

<div id="title">
ABHINAV BLOCK CRAFT
</div>

<div id="crosshair">
+
</div>

<canvas id="game"></canvas>

<script type="module">

import * as THREE from
"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";


/* ================= SCENE ================= */

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x87CEEB);

scene.fog =
new THREE.Fog(
    0x87CEEB,
    80,
    300
);


/* ================= CAMERA ================= */

const camera =
new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(
    0,
    2,
    10
);



/* ================= RENDERER ================= */

const renderer =
new THREE.WebGLRenderer({

    canvas:
    document.getElementById("game"),

    antialias:true

});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled = true;

renderer.shadowMap.type =
THREE.PCFSoftShadowMap;


/* ================= LIGHT ================= */

const sun =
new THREE.DirectionalLight(
    0xffffff,
    1.6
);

sun.position.set(
    50,
    80,
    20
);

sun.castShadow = true;

sun.shadow.mapSize.width = 1024;
sun.shadow.mapSize.height = 1024;

scene.add(sun);

scene.add(

    new THREE.AmbientLight(
        0xffffff,
        0.45
    )

);


/* ================= TEXTURES ================= */

const loader =
new THREE.TextureLoader();

const villagerTexture =
loader.load("./textures/villager.png");
const cowTexture =
loader.load("./textures/animal.png");

const pigTexture =
loader.load("./textures/fjord-horse.png");

const sheepTexture =
loader.load("./textures/forestdeeranimal.png");

const wolfTexture =
loader.load(
"./textures/the-cute-animal-pack-wolf-untamed.png"
);

[
villagerTexture,
cowTexture,
pigTexture,
sheepTexture,
wolfTexture
].forEach(t=>{

    t.magFilter =
    THREE.NearestFilter;

});


/* ================= PLAYER ================= */

const player = {

    x:0,
    y:2,
    z:10,

    velocityY:0,

    speed:0.15,

    grounded:false

};

const keys = {};
let yaw = 0;
let pitch = 0;

document.body.addEventListener("click", () => {
    document.body.requestPointerLock();
});

document.addEventListener("mousemove", (e) => {

    if (document.pointerLockElement !== document.body)
        return;

    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
pitch = Math.max(
    -1.5,
    Math.min(1.5, pitch)
);
    camera.rotation.order = "YXZ";
    camera.rotation.y = yaw;
    camera.rotation.x = pitch;
});

document.addEventListener(
"keydown",
e=>{
    keys[e.key.toLowerCase()] = true;
}
);

document.addEventListener(
"keyup",
e=>{
    keys[e.key.toLowerCase()] = false;
}
);


/* ================= TEMP GROUND ================= */

const ground =
new THREE.Mesh(

    new THREE.PlaneGeometry(
        200,
        200
    ),

    new THREE.MeshLambertMaterial({
        color:0x3FA34D
    })

);

ground.rotation.x =
-Math.PI/2;

ground.receiveShadow = true;

scene.add(ground);
/* ====================================
FILE 3B PART 1
VILLAGERS + ANIMALS
==================================== */

const villagers = [];
const animals = [];


/* ===== VILLAGER ===== */

function createVillager(x,z){

    const villager =
    new THREE.Group();

  const skin =
new THREE.MeshLambertMaterial({
    map: villagerTexture
});

  const face =
new THREE.MeshLambertMaterial({
    map: villagerTexture
});


    /* HEAD */

    const head =
    new THREE.Mesh(

        new THREE.BoxGeometry(
            0.9,
            0.9,
            0.9
        ),

        face
    );

    head.position.y = 2.4;

    villager.add(head);


    /* NOSE */

    const nose =
    new THREE.Mesh(

        new THREE.BoxGeometry(
            0.18,
            0.3,
            0.18
        ),

        face
    );

    nose.position.set(
        0,
        2.25,
        0.5
    );

    villager.add(nose);


    /* BODY */

    const body =
    new THREE.Mesh(

        new THREE.BoxGeometry(
            1,
            1.2,
            0.7
        ),

        skin
    );

    body.position.y = 1.4;

    villager.add(body);


    /* LEFT LEG */

    const leg1 =
    new THREE.Mesh(

        new THREE.BoxGeometry(
            0.25,
            0.8,
            0.25
        ),

        new THREE.MeshLambertMaterial({
            color:0x4A2B20
        })
    );

    leg1.position.set(
        -0.2,
        0.4,
        0
    );

    villager.add(leg1);


    /* RIGHT LEG */

    const leg2 =
    leg1.clone();

    leg2.position.x = 0.2;

    villager.add(leg2);


    villager.position.set(
        x,
        0,
        z
    );

    villager.traverse(o=>{

        if(o.isMesh){

            o.castShadow = true;

        }

    });

    scene.add(villager);

    villagers.push(villager);
}


/* ===== COW ===== */

function createCow(x,z){

    const material =
    new THREE.MeshLambertMaterial({
        map:cowTexture
    });

    const body =
    new THREE.Mesh(

        new THREE.BoxGeometry(
            1.5,
            1,
            1
        ),

        material
    );

    body.position.set(
        x,
        0.5,
        z
    );

    body.castShadow = true;

    scene.add(body);

    animals.push(body);
}


/* ===== PIG ===== */

function createPig(x,z){

    const material =
    new THREE.MeshLambertMaterial({
        map:pigTexture
    });

    const body =
    new THREE.Mesh(

        new THREE.BoxGeometry(
            1.2,
            0.8,
            1
        ),

        material
    );

    body.position.set(
        x,
        0.4,
        z
    );

    body.castShadow = true;

    scene.add(body);

    animals.push(body);
}
/****************************************
FILE 3B PART 2
REAL ANIMAL FUNCTIONS
PASTE HERE
****************************************/
function createRealCow(x,z){

    const cow = new THREE.Group();

    const mat = new THREE.MeshLambertMaterial({
        map:cowTexture
    });

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(2,1.2,1),
        mat
    );

    body.position.y = 1.2;
    cow.add(body);

    const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.8,0.8,0.8),
        mat
    );

    head.position.set(1.2,1.3,0);
    cow.add(head);

    for(let i=-1;i<=1;i+=2){

        for(let j=-1;j<=1;j+=2){

            const leg = new THREE.Mesh(
                new THREE.BoxGeometry(0.25,1,0.25),
                mat
            );

            leg.position.set(
                i*0.7,
                0.5,
                j*0.3
            );

            cow.add(leg);
        }
    }

    cow.position.set(x,0,z);

    cow.traverse(o=>{
        if(o.isMesh) o.castShadow = true;
    });

    scene.add(cow);
    animals.push(cow);
}


function createRealHorse(x,z){

    const horse = new THREE.Group();

    const mat = new THREE.MeshLambertMaterial({
        map:pigTexture
    });

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(2.2,1.2,0.8),
        mat
    );

    body.position.y = 1.3;
    horse.add(body);

    const neck = new THREE.Mesh(
        new THREE.BoxGeometry(0.4,1,0.4),
        mat
    );

    neck.position.set(1,1.8,0);
    horse.add(neck);

    const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.8,0.6,0.4),
        mat
    );

    head.position.set(1.3,2.2,0);
    horse.add(head);

    horse.position.set(x,0,z);

    horse.traverse(o=>{
        if(o.isMesh) o.castShadow = true;
    });

    scene.add(horse);
    animals.push(horse);
}


function createRealDeer(x,z){

    const deer = new THREE.Group();

    const mat = new THREE.MeshLambertMaterial({
        map:sheepTexture
    });

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.8,1,0.7),
        mat
    );

    body.position.y = 1.4;
    deer.add(body);

    const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.5,0.5,0.4),
        mat
    );

    head.position.set(1,2,0);
    deer.add(head);

    deer.position.set(x,0,z);

    deer.traverse(o=>{
        if(o.isMesh) o.castShadow = true;
    });

    scene.add(deer);
    animals.push(deer);
}


function createRealWolf(x,z){

    const wolf = new THREE.Group();

    const mat = new THREE.MeshLambertMaterial({
        map:wolfTexture
    });

    const body = new THREE.Mesh(
        new THREE.BoxGeometry(1.4,0.8,0.6),
        mat
    );

    body.position.y = 0.9;
    wolf.add(body);

    const head = new THREE.Mesh(
        new THREE.BoxGeometry(0.5,0.5,0.5),
        mat
    );

    head.position.set(0.9,1.1,0);
    wolf.add(head);

    wolf.position.set(x,0,z);

    wolf.traverse(o=>{
        if(o.isMesh) o.castShadow = true;
    });

    scene.add(wolf);
    animals.push(wolf);
}
/* ===== SHEEP ===== */

function createSheep(x,z){

    const material =
    new THREE.MeshLambertMaterial({
        map:sheepTexture
    });

    const body =
    new THREE.Mesh(

        new THREE.BoxGeometry(
            1.3,
            1,
            1
        ),

        material
    );

    body.position.set(
        x,
        0.5,
        z
    );

    body.castShadow = true;

    scene.add(body);

    animals.push(body);
}


/* ===== SPAWN ===== */

/* ===== SPAWN ===== */

createVillager(5,5);
createVillager(-5,8);

/* OLD ANIMALS */
createCow(10,10);
createPig(-10,10);
createSheep(0,15);

/* NEW REAL 3D ANIMALS */
createRealCow(15,12);
createRealHorse(-15,12);
createRealDeer(0,20);
createRealWolf(8,-8);

console.log("FILE 3B PART 2 LOADED");
/* ================= ANIMATE ================= */

function animate(){

    requestAnimationFrame(
        animate
    );

 const fx = Math.sin(yaw);
const fz = Math.cos(yaw);

const rx = Math.cos(yaw);
const rz = -Math.sin(yaw);

if(keys["w"]){
    player.x -= fx * player.speed;
    player.z -= fz * player.speed;
}

if(keys["s"]){
    player.x += fx * player.speed;
    player.z += fz * player.speed;
}

if(keys["a"]){
    player.x -= rx * player.speed;
    player.z -= rz * player.speed;
}

if(keys["d"]){
    player.x += rx * player.speed;
    player.z += rz * player.speed;
}


   player.velocityY -= 0.01;

player.y += player.velocityY;

if(player.y < 2){

    player.y = 2;

    player.velocityY = 0;

    player.grounded = true;

}

    if(keys[" "] && player.grounded){

        player.velocityY = 0.22;

        player.grounded = false;
    }


    camera.position.set(
        player.x,
        player.y,
        player.z
    );


    renderer.render(
        scene,
        camera
    );

}

animate();


/* ================= RESIZE ================= */

window.addEventListener(
"resize",
()=>{

camera.aspect =
window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight);

});

</script>

</body>
</html>
