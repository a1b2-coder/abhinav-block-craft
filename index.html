<body>

<canvas id="game"></canvas>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";

/* ================= TITLE ================= */

const title = document.createElement("div");

title.innerHTML = "ABHINAV BLOCK CRAFT";

title.style.position = "absolute";
title.style.top = "20px";
title.style.right = "20px";
title.style.fontSize = "34px";
title.style.fontWeight = "bold";
title.style.fontFamily = "serif";
title.style.color = "#FFD700";
title.style.textShadow =
"0 0 10px #ffcc00, 0 0 20px #ff9900, 0 0 40px black";

document.body.appendChild(title);


/* ================= CROSSHAIR ================= */

const cross = document.createElement("div");

cross.innerHTML = "+";

cross.style.position = "absolute";
cross.style.left = "50%";
cross.style.top = "50%";
cross.style.transform = "translate(-50%,-50%)";
cross.style.fontSize = "28px";
cross.style.color = "white";
cross.style.textShadow = "0 0 10px black";

document.body.appendChild(cross);


/* ================= SCENE ================= */

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x87ceeb);

scene.fog =
new THREE.Fog(0x87ceeb, 80, 250);


/* ================= CAMERA ================= */

const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0, 8, 20);


/* ================= RENDERER ================= */

const renderer =
new THREE.WebGLRenderer({

canvas:
document.getElementById("game"),

antialias:true

});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.shadowMap.enabled = true;

renderer.shadowMap.type =
THREE.PCFSoftShadowMap;


/* ================= LIGHTING ================= */

const sun =
new THREE.DirectionalLight(
0xffffff,
2
);

sun.position.set(80,120,50);

sun.castShadow = true;

sun.shadow.mapSize.width = 1024;
sun.shadow.mapSize.height = 1024;

scene.add(sun);

scene.add(
new THREE.AmbientLight(
0xffffff,
0.45
)
);


/* ================= TEXTURE SYSTEM ================= */

const textureLoader =
new THREE.TextureLoader();

/* YOUR CUSTOM SKINS */

const villagerTexture =
textureLoader.load("./textures/villager.png");

const cowTexture =
textureLoader.load("./textures/cow.png");

const pigTexture =
textureLoader.load("./textures/pig.png");

const sheepTexture =
textureLoader.load("./textures/sheep.png");


villagerTexture.magFilter =
THREE.NearestFilter;

cowTexture.magFilter =
THREE.NearestFilter;

pigTexture.magFilter =
THREE.NearestFilter;

sheepTexture.magFilter =
THREE.NearestFilter;


/* ================= TERRAIN ================= */

const grassMaterial =
new THREE.MeshLambertMaterial({
color:0x4CAF50
});

for(let x=-40;x<40;x++){
    for(let z=-40;z<40;z++){
        const block =
        new THREE.Mesh(

            new THREE.BoxGeometry(
                1,
                1,
                1
            ),

            grassMaterial
        );

        block.position.set(
            x,
            -0.5,
            z
        );

        block.receiveShadow = true;

        scene.add(block);
    }
}


/* ================= BASIC MOVEMENT ================= */

const keys = {};

document.addEventListener(
"keydown",
e=>keys[e.key.toLowerCase()]=true
);

document.addEventListener(
"keyup",
e=>keys[e.key.toLowerCase()]=false
);

/* ================= MOUNTAINS ================= */

const stoneMaterial = new THREE.MeshLambertMaterial({
    color: 0x888888
});

function createMountain(cx, cz, radius, height){

    for(let x=-radius; x<radius; x++){

        for(let z=-radius; z<radius; z++){

            const dist = Math.sqrt(x*x + z*z);

            if(dist < radius){

                const h = Math.floor(
                    (1 - dist/radius) * height
                );

                for(let y=0; y<h; y++){

                    const block = new THREE.Mesh(
                        new THREE.BoxGeometry(1,1,1),
                        stoneMaterial
                    );

                    block.position.set(
                        cx + x,
                        y + 0.5,
                        cz + z
                    );

                    block.castShadow = true;
                    block.receiveShadow = true;

                    scene.add(block);
                }
            }
        }
    }
}

createMountain(-35,-35,10,8);
createMountain(35,-30,8,7);


/* ================= RIVER ================= */

const waterMaterial = new THREE.MeshPhongMaterial({
    color:0x3399ff,
    transparent:true,
    opacity:0.85
});

for(let z=-100; z<100; z++){

    const riverWidth =
        4 + Math.sin(z*0.08)*2;

    for(let x=-riverWidth; x<riverWidth; x++){

        const water = new THREE.Mesh(

            new THREE.BoxGeometry(
                1,
                0.2,
                1
            ),

            waterMaterial
        );

        water.position.set(
            x + Math.sin(z*0.12)*8,
            -0.2,
            z
        );

        scene.add(water);
    }
}



/* ================= GIANT PINE TREES ================= */

function giantPine(x,z){

    const trunk = new THREE.Mesh(

        new THREE.CylinderGeometry(
            0.8,
            1.2,
            18
        ),

        new THREE.MeshLambertMaterial({
            color:0x5b3418
        })

    );

    trunk.position.set(x,9,z);

    trunk.castShadow = true;

    scene.add(trunk);


    for(let i=0;i<6;i++){

        const leaves = new THREE.Mesh(

            new THREE.ConeGeometry(
                4.5 - i*0.4,
                4,
                8
            ),

            new THREE.MeshLambertMaterial({
                color:0x0f6a12
            })

        );

        leaves.position.set(
            x,
            12 + i*2.5,
            z
        );

        leaves.castShadow = true;

        scene.add(leaves);
    }
}


for(let i=0;i<15;i++){

    giantPine(

        Math.random()*180 - 90,

        Math.random()*180 - 90

    );
}



/* ================= VILLAGE ROADS ================= */

const roadMaterial =
new THREE.MeshLambertMaterial({
    color:0x666666
});


function road(x1,z1,x2,z2){

    const dx = x2-x1;
    const dz = z2-z1;

    const len =
        Math.sqrt(dx*dx + dz*dz);

    const r = new THREE.Mesh(

        new THREE.BoxGeometry(
            len,
            0.15,
            4
        ),

        roadMaterial
    );

    r.position.set(

        (x1+x2)/2,

        0.05,

        (z1+z2)/2

    );

    r.rotation.y =
        Math.atan2(dz,dx);

    scene.add(r);
}


road(-20,15,20,15);
road(0,-10,0,35);



/* ================= HOUSES ================= */

function house(x,z){

    const wallMaterial =
    new THREE.MeshLambertMaterial({
        color:0x8B5A2B
    });

    const roofMaterial =
    new THREE.MeshLambertMaterial({
        color:0x333333
    });


    const base = new THREE.Mesh(

        new THREE.BoxGeometry(
            8,
            5,
            8
        ),

        wallMaterial
    );

    base.position.set(
        x,
        2.5,
        z
    );

    base.castShadow = true;

    scene.add(base);


    const roof = new THREE.Mesh(

        new THREE.ConeGeometry(
            6,
            4,
            4
        ),

        roofMaterial
    );

    roof.position.set(
        x,
        7,
        z
    );

    roof.rotation.y =
        Math.PI/4;

    roof.castShadow = true;

    scene.add(roof);
}


house(-15,15);
house(0,15);
house(15,15);

house(-15,28);
house(15,28);



/* ================= ARRAYS FOR FILE 3 ================= */

const villagers = [];
const animals = [];

console.log("FILE 2 LOADED");
/* ================= ANIMATION ================= */

function animate(){

    requestAnimationFrame(
        animate
    );

    const speed = 0.25;

    if(keys["w"])
        camera.position.z -= speed;

    if(keys["s"])
        camera.position.z += speed;

    if(keys["a"])
        camera.position.x -= speed;

    if(keys["d"])
        camera.position.x += speed;

    renderer.render(
        scene,
        camera
    );
}

animate();


/* ================= RESIZE ================= */

window.addEventListener(
"resize",
()=>{

camera.aspect =
window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight
);

});

</script>
