const worldBlocks = new Map();

function key(x, y, z){
    return `${x},${y},${z}`;
}

function placeBlock(x, y, z, material){

    const block = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        material
    );

    block.position.set(x, y, z);

    block.castShadow = true;
    block.receiveShadow = true;

    scene.add(block);

    worldBlocks.set(
        key(x,y,z),
        block
    );

    return block;
}

const sandBlock =
new THREE.MeshLambertMaterial({

const waterBlock =
new THREE.MeshPhongMaterial({
    color:0x3399FF,
    transparent:true,
    opacity:0.8
});


/* ================= MOUNTAINS ================= */

function mountain(cx, cz, radius, height){

    for(let x=-radius;x<=radius;x++){

        for(let z=-radius;z<=radius;z++){

            const d =
            Math.sqrt(x*x + z*z);

            if(d > radius) continue;

            const h =
            Math.floor(
                (1 - d/radius) * height
            );

            for(let y=0;y<h;y++){

                placeBlock(
                    cx+x,
                    y,
                    cz+z,
                    stoneBlock
                );
            }

            placeBlock(
                cx+x,
                h,
                cz+z,
                h > 12 ? snowBlock : grassBlock
            );
        }
    }
}


/* ================= RIVER ================= */

function river(){

    for(let z=-100;z<100;z++){

        const curve =
        Math.sin(z*0.08) * 8;

        for(let x=-3;x<=3;x++){

            placeBlock(
                Math.floor(curve)+x,
                -1,
                z,
                waterBlock
            );
        }
    }
}


/* ================= GIANT PINES ================= */

function pine(x,z){

    for(let y=0;y<12;y++){

        placeBlock(
            x,
            y,
            z,
            dirtBlock
        );
    }

    for(let i=0;i<4;i++){

        const size = 4-i;

        for(let dx=-size;dx<=size;dx++){

            for(let dz=-size;dz<=size;dz++){

                if(
                    Math.abs(dx)+
                    Math.abs(dz)
                    <= size+1
                ){

                    placeBlock(
                        x+dx,
                        10+i,
                        z+dz,
                        grassBlock
                    );
                }
            }
        }
    }
}

/* ===== BIOME BLOCK ===== */

function biomeBlock(x,z){

    let mat = biomeGrass;

    /* SNOW BIOME */

    if(x < -60){

        mat = biomeSnow;
    }

    /* DESERT BIOME */

    else if(x > 60){

        mat = biomeSand;
    }

    /* FOREST BIOME */

    else if(z > 50){

        mat = biomeForest;
    }

    /* PLAINS */

    else{

        mat = biomeGrass;
    }

    const block =
    new THREE.Mesh(

        new THREE.BoxGeometry(1,1,1),

        mat
    );

    block.position.set(
        x,
        -0.5,
        z
    );

    block.receiveShadow = true;

    scene.add(block);
}

/* ===== HUGE MOUNTAIN GENERATOR ===== */

function megaMountain(cx,cz,radius,height){

    for(let x=-radius;x<radius;x++){

        for(let z=-radius;z<radius;z++){

            const dist =
            Math.sqrt(x*x+z*z);

            if(dist < radius){

                const h =
                Math.floor(
                    (1-dist/radius) * height
                );

                for(let y=0;y<h;y++){

                    const block =
                    new THREE.Mesh(

                        new THREE.BoxGeometry(
                            1,1,1
                        ),

                        y > height*0.8
                        ? snowCap
                        : mountainStone

                    );

                    block.position.set(
                        cx+x,
                        y,
                        cz+z
                    );

                    block.castShadow = true;
                    block.receiveShadow = true;

                    scene.add(block);

                }

            }

        }

    }

}

/* ===== GIANT PINE TREES ===== */

const pineTrunk =
new THREE.MeshLambertMaterial({

});

const pineLeaves =
new THREE.MeshLambertMaterial({
    color:0x0B5F18
});


function giantPine(x,z){

    const trunkHeight =
    12 + Math.random()*10;


    /* TRUNK */

    for(let y=0;y<trunkHeight;y++){

        const log =
        new THREE.Mesh(

            new THREE.BoxGeometry(
                1,1,1
            ),

            pineTrunk
        );

        log.position.set(
            x,
            y,
            z
        );

        log.castShadow = true;

        scene.add(log);

    }


    /* LEAVES */

    let size = 6;

    for(let level=0;level<6;level++){

        for(let lx=-size;lx<=size;lx++){

            for(let lz=-size;lz<=size;lz++){

                if(

                    Math.abs(lx)+
                    Math.abs(lz)

                    < size+1

                ){

                    const leaf =
                    new THREE.Mesh(

                        new THREE.BoxGeometry(
                            1,1,1
                        ),

                        pineLeaves
                    );

                    leaf.position.set(

                        x+lx,

                        trunkHeight-2
                        + level,

                        z+lz

                    );

                    leaf.castShadow = true;

                    scene.add(leaf);

                }

            }

        }

        size--;

    }

}
