<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ABHINAV BLOCK CRAFT</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
}

canvas{
    display:block;
}

#title{
    position:absolute;
    top:20px;
    right:20px;

    font-size:42px;
    font-weight:bold;
    font-family:serif;

    color:#FFD700;

    text-shadow:
        0 0 10px #FFD700,
        0 0 20px orange,
        0 0 40px black;

    z-index:100;
}

#crosshair{
    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    color:white;
    font-size:28px;

    text-shadow:0 0 10px black;

    pointer-events:none;

    z-index:100;
}
</style>

</head>

<body>

<div id="title">
ABHINAV BLOCK CRAFT
</div>

<div id="crosshair">
+
</div>

<canvas id="game"></canvas>

<script type="module">

import * as THREE from
"https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";


/* ================= SCENE ================= */

const scene = new THREE.Scene();

scene.background =
new THREE.Color(0x87CEEB);

scene.fog =
new THREE.Fog(
    0x87CEEB,
    80,
    300
);


/* ================= CAMERA ================= */

const camera =
new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(
    0,
    5,
    10
);


/* ================= RENDERER ================= */

const renderer =
new THREE.WebGLRenderer({

    canvas:
    document.getElementById("game"),

    antialias:true

});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled = true;

renderer.shadowMap.type =
THREE.PCFSoftShadowMap;


/* ================= LIGHT ================= */

const sun =
new THREE.DirectionalLight(
    0xffffff,
    1.6
);

sun.position.set(
    50,
    80,
    20
);

sun.castShadow = true;

sun.shadow.mapSize.width = 1024;
sun.shadow.mapSize.height = 1024;

scene.add(sun);

scene.add(

    new THREE.AmbientLight(
        0xffffff,
        0.45
    )

);


/* ================= TEXTURES ================= */

const loader =
new THREE.TextureLoader();

const villagerTexture =
loader.load("./textures/villager.png");

const cowTexture =
loader.load("./textures/cow.png");

const pigTexture =
loader.load("./textures/pig.png");

const sheepTexture =
loader.load("./textures/sheep.png");


[
villagerTexture,
cowTexture,
pigTexture,
sheepTexture
].forEach(t=>{

    t.magFilter =
    THREE.NearestFilter;

});


/* ================= PLAYER ================= */

const player = {

    x:0,
    y:5,
    z:10,

    velocityY:0,

    speed:0.15,

    grounded:false

};

const keys = {};


document.addEventListener(
"keydown",
e=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener(
"keyup",
e=>{
    keys[e.key.toLowerCase()] = false;
});


/* ================= TEMP GROUND ================= */

const ground =
new THREE.Mesh(

    new THREE.PlaneGeometry(
        200,
        200
    ),

    new THREE.MeshLambertMaterial({
        color:0x3FA34D
    })

);

ground.rotation.x =
-Math.PI/2;

ground.receiveShadow = true;

scene.add(ground);


/* ================= ANIMATE ================= */

function animate(){

    requestAnimationFrame(
        animate
    );

    if(keys["w"])
        player.z -= player.speed;

    if(keys["s"])
        player.z += player.speed;

    if(keys["a"])
        player.x -= player.speed;

    if(keys["d"])
        player.x += player.speed;


    player.velocityY -= 0.01;

    player.y += player.velocityY;


    if(player.y < 5){

        player.y = 5;

        player.velocityY = 0;

        player.grounded = true;
    }


    if(keys[" "] && player.grounded){

        player.velocityY = 0.25;

        player.grounded = false;
    }


    camera.position.set(
        player.x,
        player.y,
        player.z
    );


    renderer.render(
        scene,
        camera
    );

}

animate();


/* ================= RESIZE ================= */

window.addEventListener(
"resize",
()=>{

camera.aspect =
window.innerWidth /
window.innerHeight;

camera.updateProjectionMatrix();

renderer.setSize(
window.innerWidth,
window.innerHeight);

});

</script>

</body>
</html>
