<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Abhinav Block Craft</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:#87CEEB;
    font-family:Arial,sans-serif;
}

#menu{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,.5);
    color:white;
    padding:12px;
    border-radius:10px;
    z-index:100;
}

#crosshair{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:30px;
    user-select:none;
}

canvas{
    display:block;
}

</style>
</head>

<body>

<div id="menu">
<h2>Abhinav Block Craft</h2>

WASD = Move<br>
SPACE = Jump<br>
Click = Mouse Look

</div>

<div id="crosshair">+</div>

<canvas id="game"></canvas>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";


// ===== SCENE =====

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);


// ===== CAMERA =====

const camera = new THREE.PerspectiveCamera(
    75,
    window.innerWidth/window.innerHeight,
    0.1,
    1000
);

camera.position.set(0,5,20);


// ===== RENDERER =====

const renderer = new THREE.WebGLRenderer({
    canvas:document.getElementById("game"),
    antialias:true
});

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;


// ===== LIGHTING =====

const sun = new THREE.DirectionalLight(
    0xffffff,
    1.5
);

sun.position.set(30,50,20);

sun.castShadow = true;

sun.shadow.mapSize.width = 2048;
sun.shadow.mapSize.height = 2048;

scene.add(sun);


scene.add(
    new THREE.AmbientLight(
        0xffffff,
        0.5
    )
);


// ===== MATERIALS =====

const grassMaterial =
new THREE.MeshLambertMaterial({
    color:0x55aa55
});

const woodMaterial =
new THREE.MeshLambertMaterial({
    color:0x8B4513
});

const leafMaterial =
new THREE.MeshLambertMaterial({
    color:0x228B22
});

const roadMaterial =
new THREE.MeshLambertMaterial({
    color:0x666666
});

const glassMaterial =
new THREE.MeshLambertMaterial({
    color:0x88ccff,
    transparent:true,
    opacity:0.5
});

const whiteMaterial =
new THREE.MeshLambertMaterial({
    color:0xffffff
});

const darkMaterial =
new THREE.MeshLambertMaterial({
    color:0x333333
});


// ===== WORLD =====

for(let x=-30;x<30;x++){

    for(let z=-30;z<30;z++){

        const block =
        new THREE.Mesh(

            new THREE.BoxGeometry(1,1,1),
            grassMaterial

        );

        block.position.set(
            x,
            -0.5,
            z
        );

        block.receiveShadow = true;

        scene.add(block);

    }

}
    // ===== WORLD TERRAIN DETAIL =====

for(let x=-30;x<30;x++){
for(let z=-30;z<30;z++){

    const h =
    Math.floor(
        Math.sin(x*0.2)*2 +
        Math.cos(z*0.2)*2
    );

    const block =
    new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        grassMaterial
    );

    block.position.set(x,h-1,z);
    block.castShadow = true;
    block.receiveShadow = true;

    scene.add(block);
}
}


// ===== TREES =====

function makeTree(x,z){

    const trunk =
    new THREE.Mesh(
        new THREE.BoxGeometry(1,4,1),
        woodMaterial
    );

    trunk.position.set(x,1,z);
    trunk.castShadow = true;

    scene.add(trunk);

    const leaves =
    new THREE.Mesh(
        new THREE.BoxGeometry(3,3,3),
        leafMaterial
    );

    leaves.position.set(x,4,z);
    leaves.castShadow = true;

    scene.add(leaves);
}

for(let i=0;i<20;i++){
    makeTree(
        Math.random()*40-20,
        Math.random()*40-20
    );
}


// ===== MODERN HOUSES (7) =====

function makeHouse(x,z){

    const base =
    new THREE.Mesh(
        new THREE.BoxGeometry(6,4,6),
        darkMaterial
    );

    base.position.set(x,2,z);
    base.castShadow = true;
    scene.add(base);

    const roof =
    new THREE.Mesh(
        new THREE.BoxGeometry(7,1,7),
        whiteMaterial
    );

    roof.position.set(x,5,z);
    roof.castShadow = true;
    scene.add(roof);

    const glass =
    new THREE.Mesh(
        new THREE.BoxGeometry(4,2,0.2),
        glassMaterial
    );

    glass.position.set(x,2,z+3);
    scene.add(glass);
}


// ===== 7 HOUSES PLACEMENT =====

makeHouse(0,0);
makeHouse(10,0);
makeHouse(20,0);

makeHouse(0,10);
makeHouse(10,10);
makeHouse(20,10);

makeHouse(10,20);


// ===== ROADS =====

function makeRoad(x1,z1,x2,z2){

    const dx = x2-x1;
    const dz = z2-z1;

    const length =
    Math.sqrt(dx*dx+dz*dz);

    const road =
    new THREE.Mesh(
        new THREE.BoxGeometry(length,0.2,2),
        roadMaterial
    );

    road.position.set(
        (x1+x2)/2,
        -0.3,
        (z1+z2)/2
    );

    road.rotation.y =
    Math.atan2(dz,dx);

    scene.add(road);
}

makeRoad(0,0,20,0);
makeRoad(0,10,20,10);
makeRoad(10,0,10,20);


// ===== FARM =====

function makeFarm(x,z){

    for(let i=0;i<6;i++){
    for(let j=0;j<6;j++){

        const wheat =
        new THREE.Mesh(
            new THREE.BoxGeometry(0.2,1,0.2),
            leafMaterial
        );

        wheat.position.set(
            x+i,
            0,
            z+j
        );

        scene.add(wheat);
    }}
}

makeFarm(25,10);


// ===== VILLAGERS ARRAY =====

const villagers = [];

function createVillager(x,z){

    const villager =
    new THREE.Group();

    const body =
    new THREE.Mesh(
        new THREE.BoxGeometry(1,1.5,1),
        woodMaterial
    );

    const head =
    new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        glassMaterial
    );

    body.position.y=0.7;
    head.position.y=2;

    villager.add(body);
    villager.add(head);

    villager.position.set(x,0,z);

    scene.add(villager);
    villagers.push(villager);
}

createVillager(5,5);
createVillager(15,5);
createVillager(10,15);
    // ===== PLAYER =====

const keys = {};

document.addEventListener("keydown",(e)=>{
    keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup",(e)=>{
    keys[e.key.toLowerCase()] = false;
});


// ===== JUMP =====

let velocityY = 0;
let onGround = true;

document.addEventListener("keydown",(e)=>{

    if(e.code==="Space" && onGround){

        velocityY = 0.18;
        onGround = false;

    }

});


// ===== MOUSE LOOK =====

document.body.addEventListener("click",()=>{

    renderer.domElement.requestPointerLock();

});

let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove",(e)=>{

    if(
        document.pointerLockElement
        !== renderer.domElement
    ) return;

    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;

    pitch = Math.max(
        -Math.PI/2,
        Math.min(Math.PI/2,pitch)
    );

    camera.rotation.order = "YXZ";

    camera.rotation.y = yaw;
    camera.rotation.x = pitch;

});


// ===== START POSITION =====

camera.position.set(
    10,
    3,
    30
);


// ===== ANIMATION =====

function animate(){

    requestAnimationFrame(animate);

    const speed = 0.15;

    const forward =
    new THREE.Vector3(
        Math.sin(yaw),
        0,
        Math.cos(yaw)
    );

    const right =
    new THREE.Vector3(
        Math.cos(yaw),
        0,
        -Math.sin(yaw)
    );


    if(keys["w"]){

        camera.position.add(
            forward.clone()
            .multiplyScalar(speed)
        );

    }

    if(keys["s"]){

        camera.position.add(
            forward.clone()
            .multiplyScalar(-speed)
        );

    }

    if(keys["a"]){

        camera.position.add(
            right.clone()
            .multiplyScalar(-speed)
        );

    }

    if(keys["d"]){

        camera.position.add(
            right.clone()
            .multiplyScalar(speed)
        );

    }


    // Gravity

    velocityY -= 0.01;

    camera.position.y += velocityY;


    if(camera.position.y < 3){

        camera.position.y = 3;
        velocityY = 0;
        onGround = true;

    }


    // Villager movement

    villagers.forEach((v,i)=>{

        v.position.x +=
            Math.sin(
                Date.now()*0.001 + i
            ) * 0.005;

        v.rotation.y += 0.01;

    });


    renderer.render(
        scene,
        camera
    );

}

animate();


// ===== RESIZE =====

window.addEventListener("resize",()=>{

    camera.aspect =
        window.innerWidth /
        window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(
        window.innerWidth,
        window.innerHeight
    );

});

</script>

</body>
</html>
