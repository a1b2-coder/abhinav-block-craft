<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ABHINAV BLOCK CRAFT - CLEAN V1</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#87CEEB;
    font-family:Arial;
}

#title{
    position:absolute;
    top:15px;
    right:15px;
    color:white;
    font-size:22px;
    font-weight:bold;
    text-shadow:0 0 10px black;
    z-index:10;
}

#crosshair{
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
    color:white;
    font-size:28px;
    pointer-events:none;
    text-shadow:0 0 10px black;
}

canvas{display:block;}
</style>
</head>

<body>

<div id="title">ABHINAV BLOCK CRAFT</div>
<div id="crosshair">+</div>

<canvas id="game"></canvas>

<script type="module">

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.179.1/build/three.module.js";

/* ================= SCENE ================= */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

/* ================= CAMERA ================= */
const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,5,10);

/* ================= RENDERER ================= */
const renderer = new THREE.WebGLRenderer({
canvas:document.getElementById("game"),
antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

/* ================= LIGHT ================= */
const light = new THREE.DirectionalLight(0xffffff,1.2);
light.position.set(20,30,10);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.5));

/* ================= GROUND ================= */
const groundGeo = new THREE.PlaneGeometry(200,200);
const groundMat = new THREE.MeshLambertMaterial({color:0x3aa655});
const ground = new THREE.Mesh(groundGeo,groundMat);

ground.rotation.x = -Math.PI/2;
scene.add(ground);

/* ================= SIMPLE CUBES (WORLD) ================= */
const cubes = [];

for(let i=0;i<50;i++){
    const cube = new THREE.Mesh(
        new THREE.BoxGeometry(1,1,1),
        new THREE.MeshLambertMaterial({color:0x8B4513})
    );

    cube.position.set(
        (Math.random()*40-20),
        0.5,
        (Math.random()*40-20)
    );

    scene.add(cube);
    cubes.push(cube);
}

/* ================= TREES ================= */
function tree(x,z){

    const trunk = new THREE.Mesh(
        new THREE.BoxGeometry(0.5,3,0.5),
        new THREE.MeshLambertMaterial({color:0x8B4513})
    );

    trunk.position.set(x,1.5,z);
    scene.add(trunk);

    const leaves = new THREE.Mesh(
        new THREE.SphereGeometry(1.5,8,8),
        new THREE.MeshLambertMaterial({color:0x228B22})
    );

    leaves.position.set(x,3,z);
    scene.add(leaves);
}

for(let i=0;i<15;i++){
    tree(Math.random()*50-25,Math.random()*50-25);
}

/* ================= SIMPLE PLAYER CONTROL ================= */
let speed = 0.2;

document.addEventListener("keydown",(e)=>{

    if(e.key==="w") camera.position.z -= speed;
    if(e.key==="s") camera.position.z += speed;
    if(e.key==="a") camera.position.x -= speed;
    if(e.key==="d") camera.position.x += speed;

});

/* ================= ANIMATE ================= */
function animate(){
    requestAnimationFrame(animate);

    cubes.forEach(c=>{
        c.rotation.y += 0.01;
    });

    renderer.render(scene,camera);
}

animate();

/* ================= RESIZE FIX ================= */
window.addEventListener("resize",()=>{

camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();

renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
